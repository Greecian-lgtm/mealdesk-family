<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MealDesk Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1a14;color:#f0f4f1;min-height:100vh}
#login{display:flex;min-height:100vh;align-items:center;justify-content:center;padding:20px}
#dash{display:none}
.card{background:#1a2e22;border:1px solid #2a4035;border-radius:14px;padding:28px;width:100%;max-width:360px}
.logo{font-size:24px;font-weight:800;color:#c9963a;margin-bottom:2px}
.sub{font-size:12px;color:#8faa97;margin-bottom:22px}
label{display:block;font-size:11px;color:#8faa97;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.06em}
input[type=password],input[type=text],input[type=email]{width:100%;padding:10px 12px;border:1px solid #2a4035;border-radius:8px;background:#0f1a14;color:#f0f4f1;font-size:13px;outline:none;margin-bottom:12px}
input:focus{border-color:#4a7c59}
.btn{width:100%;padding:11px;background:#4a7c59;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn:hover{background:#3d6a4a}
.hint{font-size:11px;color:#8faa97;text-align:center;margin-top:12px;line-height:1.6}
.hint code{background:#1a2e22;color:#c9963a;padding:1px 5px;border-radius:4px}
.err{font-size:12px;color:#e05050;margin-top:8px;text-align:center;display:none}
/* dash */
.topbar{background:#1a2e22;border-bottom:1px solid #2a4035;padding:12px 20px;display:flex;align-items:center;gap:12px}
.tlogo{font-size:15px;font-weight:800;color:#c9963a}
.tsub{font-size:11px;color:#8faa97;margin-left:4px}
.tbtn{margin-left:auto;padding:6px 12px;background:none;border:1px solid #2a4035;border-radius:7px;color:#8faa97;font-size:12px;cursor:pointer}
.tbtn:hover{border-color:#e05050;color:#e05050}
.main{padding:16px 20px;max-width:900px}
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.scard{background:#1a2e22;border:1px solid #2a4035;border-radius:10px;padding:12px 14px}
.sval{font-size:22px;font-weight:700;color:#c9963a}
.slb{font-size:10px;color:#8faa97;margin-top:2px;text-transform:uppercase;letter-spacing:.06em}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.dc{background:#1a2e22;border:1px solid #2a4035;border-radius:12px;padding:14px}
.dc-title{font-size:11px;font-weight:700;color:#8faa97;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.urow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #2a4035}
.urow:last-child{border-bottom:none}
.uem{font-size:22px}
.uname{font-size:13px;font-weight:700}
.umeta{font-size:11px;color:#8faa97;margin-top:1px}
.ucnt{font-size:20px;font-weight:700;color:#c9963a;margin-left:auto}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.blbl{width:76px;font-size:11px;color:#8faa97;text-align:right;text-transform:capitalize;flex-shrink:0}
.btrack{flex:1;height:8px;background:#0f1a14;border-radius:4px;overflow:hidden}
.bfill{height:100%;border-radius:4px}
.bnum{width:24px;font-size:11px;font-weight:600;color:#f0f4f1}
.erow{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid #2a4035;font-size:11px}
.erow:last-child{border-bottom:none}
.et{color:#8faa97;width:52px;flex-shrink:0}
.eu{font-weight:700;width:66px;flex-shrink:0;color:#c9963a}
.ek{width:80px;flex-shrink:0}
.ed{color:#f0f4f1;flex:1}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;background:#0d2a1a;border:1px solid #2a5a35;color:#4a7c59;margin-left:auto}
.dot{width:7px;height:7px;border-radius:50%;background:#4a7c59;animation:p 2s ease-out infinite}
@keyframes p{0%{box-shadow:0 0 0 0 rgba(74,124,89,.6)}70%{box-shadow:0 0 0 5px transparent}100%{box-shadow:0 0 0 0 transparent}}
</style>
</head>
<body>

<div id="login">
  <div class="card">
    <div class="logo">MealDesk</div>
    <div class="sub">Admin Dashboard · Stavros Research Labs</div>
    <label>Admin Password</label>
    <input type="password" id="pw" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Sign in</button>
    <div class="err" id="err">Incorrect password.</div>
    <div class="hint">Default password: <code>stavros2026</code><br>Change via <code>ADMIN_PASS</code> env var in Vercel.</div>
  </div>
</div>

<div id="dash">
  <div class="topbar">
    <div class="tlogo">MealDesk Admin</div>
    <div class="tsub" id="tsub"></div>
    <div class="badge"><div class="dot"></div><span id="badgetxt">demo</span></div>
    <button class="tbtn" onclick="logout()">Sign out</button>
  </div>
  <div class="main">
    <div class="sgrid">
      <div class="scard"><div class="sval" id="s1">—</div><div class="slb">Events (7 days)</div></div>
      <div class="scard"><div class="sval" id="s2">—</div><div class="slb">Active users</div></div>
      <div class="scard"><div class="sval" id="s3">—</div><div class="slb">Today</div></div>
      <div class="scard"><div class="sval" id="s4">—</div><div class="slb">Top tab</div></div>
    </div>
    <div class="grid2">
      <div class="dc"><div class="dc-title">Users</div><div id="users"></div></div>
      <div class="dc"><div class="dc-title">Tab views (7 days)</div><div id="tabs"></div></div>
    </div>
    <div class="grid2">
      <div class="dc"><div class="dc-title">AI features used</div><div id="feats"></div></div>
      <div class="dc"><div class="dc-title">Daily activity</div><div id="days"></div></div>
    </div>
    <div class="dc" style="margin-bottom:16px">
      <div class="dc-title">Recent events</div>
      <div id="feed"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const PASS = 'stavros2026'; // fallback — overridden by ADMIN_PASS env var on API
const SESSION_KEY = 'mdf_adm';
const TC = {today:'#c9963a',kitchen:'#c0392b',recipes:'#0891b2',profile:'#8faa97',remedies:'#4a7c59',exercise:'#7c3aed',progress:'#2563eb'};
const FC = {'For You':'#4a7c59','AI Swap':'#c9963a','Kitchen Scan':'#c0392b','Ask Chef':'#0891b2','AI Chat':'#7c3aed','For You Recipes':'#059669','AI Meal':'#c9963a'};
const UE = {Peter:'🧔',Evangelia:'👵'};
const D7 = Array.from({length:7},(_,i)=>new Date(Date.now()-i*86400000).toISOString().slice(0,10));

// ── DEMO DATA ───────────────────────────────────────────────────────────────
const DEMO = (()=>{
  const s={totalEvents:147,byUser:{Peter:{events:89,tabs:{today:38,remedies:22,recipes:15,exercise:8,kitchen:4,progress:2},features:{'For You':31,'AI Swap':22,'Ask Chef':8,'Kitchen Scan':6},lastSeen:Date.now()-120000},Evangelia:{events:58,tabs:{remedies:28,today:16,recipes:12,progress:8,kitchen:4,profile:3,exercise:1},features:{'For You':28,'Ask Chef':10,'AI Swap':4,'Kitchen Scan':2},lastSeen:Date.now()-900000}},byTab:{today:54,remedies:50,recipes:27,exercise:9,kitchen:8,progress:10,profile:3},byFeature:{'For You':59,'AI Swap':26,'Ask Chef':18,'Kitchen Scan':8},byDay:{},recentEvents:[]};
  D7.forEach((d,i)=>s.byDay[d]=[28,22,19,31,24,16,7][i]);
  s.recentEvents=[{event:'tab_view',data:'remedies',user:'Peter',ts:Date.now()-180000},{event:'feature_use',data:'For You',user:'Peter',ts:Date.now()-240000},{event:'tab_view',data:'remedies',user:'Evangelia',ts:Date.now()-900000},{event:'tab_view',data:'today',user:'Peter',ts:Date.now()-1200000},{event:'feature_use',data:'AI Swap',user:'Peter',ts:Date.now()-1800000},{event:'tab_view',data:'recipes',user:'Evangelia',ts:Date.now()-3600000},{event:'feature_use',data:'For You',user:'Evangelia',ts:Date.now()-4200000},{event:'tab_view',data:'exercise',user:'Peter',ts:Date.now()-7200000}];
  return s;
})();

// ── STATE ───────────────────────────────────────────────────────────────────
let authed = false;
let timer = null;

// ── AUTH ────────────────────────────────────────────────────────────────────
async function login(){
  const pw = document.getElementById('pw').value;
  if(!pw) return;
  document.getElementById('err').style.display='none';

  // Try the API first
  let apiOk = false;
  let apiData = null;
  try{
    const r = await fetch('/api/admin',{
      method:'POST',
      headers:{'Content-Type':'application/json','X-Action':'login'},
      body:JSON.stringify({password:pw})
    });
    const d = await r.json();
    if(d.ok){
      apiOk = true;
      apiData = d;
      sessionStorage.setItem(SESSION_KEY, d.sessionToken||'api-ok');
    }
  }catch(e){/* API unreachable */}

  // If API didn't work, check against hardcoded fallback
  if(!apiOk){
    if(pw !== PASS){
      document.getElementById('err').style.display='block';
      return;
    }
    sessionStorage.setItem(SESSION_KEY,'local-ok');
  }

  authed = true;
  showDash(apiData);
}

function logout(){
  authed = false;
  clearInterval(timer);
  sessionStorage.removeItem(SESSION_KEY);
  document.getElementById('dash').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('pw').value='';
}

// ── CHECK SAVED SESSION ─────────────────────────────────────────────────────
(function checkSaved(){
  const saved = sessionStorage.getItem(SESSION_KEY);
  if(saved){ authed=true; showDash(null); }
})();

// ── DASHBOARD ───────────────────────────────────────────────────────────────
function showDash(apiData){
  document.getElementById('login').style.display='none';
  document.getElementById('dash').style.display='block';

  // Render immediately with demo data — never wait for API
  render(DEMO);

  // If API gave us live data use it
  if(apiData && apiData.stats){
    render(apiData.stats);
    document.getElementById('badgetxt').textContent='live';
  }

  // Try to load live data in background — fail silently
  loadLive();
  clearInterval(timer);
  timer = setInterval(loadLive, 30000);
}

async function loadLive(){
  if(!authed) return;
  try{
    const tok = sessionStorage.getItem(SESSION_KEY)||'';
    const r = await fetch('/api/admin',{headers:{'Authorization':'Bearer '+tok}});
    if(r.ok){
      const d = await r.json();
      if(d && d.stats){
        render(d.stats);
        document.getElementById('badgetxt').textContent='live';
      }
    }
    // Any failure — just keep showing what we have. Never logout.
  }catch(e){/* silent */}
  document.getElementById('tsub').textContent='Updated '+new Date().toLocaleTimeString();
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(s){
  try{
    const today = new Date().toISOString().slice(0,10);
    document.getElementById('s1').textContent = s.totalEvents||0;
    document.getElementById('s2').textContent = Object.keys(s.byUser||{}).length;
    document.getElementById('s3').textContent = s.byDay?.[today]||0;
    const top = Object.entries(s.byTab||{}).sort((a,b)=>b[1]-a[1])[0];
    document.getElementById('s4').textContent = top?top[0]:'—';
    document.getElementById('tsub').textContent = 'Updated '+new Date().toLocaleTimeString();

    // Users
    const users = Object.entries(s.byUser||{}).sort((a,b)=>b[1].events-a[1].events);
    document.getElementById('users').innerHTML = users.map(([n,u])=>`
      <div class="urow">
        <div class="uem">${UE[n]||'👤'}</div>
        <div>
          <div class="uname">${n}</div>
          <div class="umeta">${ago(u.lastSeen)} · ${u.events} events</div>
          <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${Object.entries(u.tabs||{}).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([t,c])=>`<span style="font-size:10px;padding:2px 6px;border-radius:10px;background:${TC[t]||'#4a7c59'}22;color:${TC[t]||'#4a7c59'};border:1px solid ${TC[t]||'#4a7c59'}44">${t} ${c}</span>`).join('')}</div>
        </div>
        <div class="ucnt">${u.events}</div>
      </div>`).join('') || '<div style="font-size:12px;color:#8faa97;padding:12px 0">No users yet.</div>';

    // Bars
    bars('tabs', s.byTab, TC);
    bars('feats', s.byFeature, FC);

    // Days
    const mx = Math.max(...D7.map(d=>s.byDay?.[d]||0),1);
    document.getElementById('days').innerHTML = D7.map(d=>`
      <div class="brow">
        <div class="blbl" style="width:50px">${d.slice(5)}</div>
        <div class="btrack"><div class="bfill" style="width:${Math.round((s.byDay?.[d]||0)/mx*100)}%;background:#4a7c59"></div></div>
        <div class="bnum">${s.byDay?.[d]||0}</div>
      </div>`).join('');

    // Feed
    const evts = (s.recentEvents||[]).slice(0,15);
    document.getElementById('feed').innerHTML = evts.map(e=>`
      <div class="erow">
        <div class="et">${tshort(e.ts)}</div>
        <div class="eu">${e.user||'?'}</div>
        <div class="ek" style="color:${e.event==='tab_view'?'#c9963a':'#4a7c59'}">${e.event}</div>
        <div class="ed">${e.data||''}</div>
      </div>`).join('') || '<div style="font-size:12px;color:#8faa97;padding:12px 0">No events yet.</div>';
  }catch(err){
    // render error — log it but NEVER logout
    console.error('render error:',err);
  }
}

function bars(id, data, colorMap){
  const entries = Object.entries(data||{}).sort((a,b)=>b[1]-a[1]);
  const mx = entries[0]?.[1]||1;
  document.getElementById(id).innerHTML = entries.map(([k,v])=>`
    <div class="brow">
      <div class="blbl">${k}</div>
      <div class="btrack"><div class="bfill" style="width:${Math.round(v/mx*100)}%;background:${colorMap[k]||'#4a7c59'}"></div></div>
      <div class="bnum">${v}</div>
    </div>`).join('') || '<div style="font-size:12px;color:#8faa97;padding:8px 0">No data yet.</div>';
}

function ago(ts){
  if(!ts) return 'never';
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return s+'s ago';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}
function tshort(ts){
  if(!ts) return '—';
  return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
</script>
</body>
</html>
